<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body style="background-color: antiquewhite;">
    <div style="background-color: rgb(100, 171, 184); height: 20%; width: 45%;margin: 200px 450px;border: solid 2px;">
        <div style="margin-left: 45%; color: red;">
            <h3>Login</h3>
        </div>
        <form action="">
            <div style="margin: 30px;">
                <label>First Name</label>&nbsp;:&nbsp;<input type="text" placeholder="Enter Your First Name" required>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 
                <label>Last Name</label>&nbsp;:&nbsp; <input type="text" placeholder="Enter Your Last Name" style="margin-left: 56px;" required>
            </div>
            <div style="margin: 30px;">
                <label>Age</label>&nbsp;:&nbsp;<input type="age" placeholder="Enter your age" style="margin-left: 45px;" required>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <label>City</label>&nbsp;:&nbsp; <input type="text" placeholder="Enter Your city" style="margin-left: 99px;">
            </div>
            <div style="margin: 30px;">
                <label>Gender</label>: 
                    <select name="male" id="gender" style="margin-left: 30px;" >
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                    
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <label>Qualification</label>&nbsp;:&nbsp;                     
                    <select name="Qualification" id="Qualification" style="margin-left: 45px;" >
                        <option value="Bachelors degree">Bachelors Degree</option>
                        <option value="Masters degree">Masters degree</option>
                    </select>
            </div>
            <div style="margin: 30px;">
                <label>Email</label>:<input type="email" placeholder="Enter your Email" style="margin-left: 45px;" required >
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <label>Mobile</label>:<input type="text" placeholder="Enter Your mobile no" style="margin-left: 90px;" required>
            </div>
            <div style="margin: 30px;">
                <label>Password</label>:<input type="password" placeholder="Enter your password" style="margin-left: 20px;" required >
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <label>Confirm password</label>:<input type="password" placeholder="Enter Your mobile no" style="margin-left: 20px;" required>
            </div>
            <div style="margin: 30px;">
                <input type="button" value="Submit" style="margin-left: 40%;">
                <input type="reset" value="Reset">
            </div>
        </form>
    </div>
</body>
</html>
