<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <style>
        .container{
            display: flex;
            background-color: blue;
        }

        .container div{
            background-color: blueviolet;
            margin: 10px;
            padding: 20px;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>1st</div>
        <div>2nd</div>
        <div>3rd</div>
        <div>4th</div>
    </div>
    
</body>
</html>
