<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <div style="background-color: rgb(174, 27, 121); height: 20%; width: 45%;margin: 100px 500px;border: solid 2px;">
        <div style="margin-left: 35%;">
            <h3>Registration Form</h3>
        </div>
        <form action="">
            <div style="margin: 30px;">
                <label>First Name</label>&nbsp;:&nbsp;<input type="text" placeholder="Enter Your First Name">
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 
                <label>Last Name</label>&nbsp;:&nbsp; <input type="text" placeholder="Enter Your Last Name">
            </div>
            <div style="margin: 30px;">
                <label>Age</label>&nbsp;:&nbsp;<input type="age" placeholder="Enter your age" style="margin-left: 45px;">
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <label>City</label>&nbsp;:&nbsp; <input type="text" placeholder="Enter Your city" style="margin-left: 43px;">
            </div>
            <div style="margin: 30px;">
                <label>Gender</label>&nbsp;:&nbsp; 
                    <select name="male" id="gender" style="margin-left: 30px;">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                    
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <label>City</label>&nbsp;:&nbsp; <input type="text" placeholder="Enter Your city" style="margin-left: 43px;">
            </div>
        </form>
    </div>
</body>
</html>
